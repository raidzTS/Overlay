<script>
    const settings = {
    "image": {
            'D2': 'upnextleftlogo',
            'G9': 'upnextrightlogo',

            'D13': 'topleftteamlogo',
            'G13': 'toprightteamlogo',
            'D14': 'midleftteamlogo',
            'G14': 'midrightteamlogo',
            'D15': 'botleftteamlogo',
            'G15': 'botrightteamlogo',
        }
    };

    const spreadsheetID = '1D7LDvXXXAbJVpD88GmsmXg9bFgDwwveFDOMvgX4oat4';
    const worksheetName = 'Double Elim Top 32';
    const apiKey = 'AIzaSyByYOzOq1SV8-UmU5N3YnNlQPvoHkNv-60';

    const updateInterval = 3000;

    const u = new GraphicsUpdater(
        settings,
        spreadsheetID,
        worksheetName,
        apiKey,
        updateInterval,
        false
    );

    u.addOperation('regex', regexOperation);
    u.startUpdating();

    const ticker = new TickerUpdater(1000);

    /* ===================== BRACKET IMAGE ===================== */

    const teamElement = document.getElementById("team");
    const topImage = document.getElementById("topimage");

    function updateBracketImage() {
        const team = teamElement.textContent.trim();

        if (!team) {
            topImage.removeAttribute("src");
            return;
        }

        topImage.src = `ModularPieces/Teams/${team}/Swiss_Bracket.png`;
    }

    new MutationObserver(updateBracketImage).observe(teamElement, {
        childList: true,
        characterData: true,
        subtree: true
    });

    updateBracketImage();
</script>
